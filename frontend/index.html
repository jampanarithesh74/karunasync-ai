<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KarunaSync AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="roleScreen" class="role-screen">
        <div class="role-content">
            <div class="role-logo">
                <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
                    <circle cx="16" cy="16" r="12" stroke="white" stroke-width="2.5"/>
                    <path d="M16 10v12M10 16h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="role-title">KarunaSync AI</h1>
            <p class="role-subtitle">Synchronizing compassion with action</p>
            
            <div class="role-cards">
                <button class="role-card ngo" onclick="selectRole('ngo')">
                    <div class="role-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <span class="role-name">NGO</span>
                    <span class="role-desc">Submit reports & analyze needs</span>
                </button>
                
                <button class="role-card volunteer" onclick="selectRole('volunteer')">
                    <div class="role-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <span class="role-name">Volunteer</span>
                    <span class="role-desc">Match skills & help communities</span>
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="dashboard hidden">
    </div>

    <script src="script.js"></script>
</body>
</html>
